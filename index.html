<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafli's | Home</title>
    <link rel="stylesheet" href="base.css">
    <!-- INTERNAL CSS -->
    <style>
        /* 3. ID Selector */
        #hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 45px;
            max-width: 90vw;
            margin: auto;
            min-height: 80vh;
            text-align: center;
            background-image: url('assets/hero_bg.png');
            background-position: top;
            background-repeat: no-repeat;
        }

        #hero-title {
            font-size: 90px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 20px;
            color: #ffffff;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        @media screen and (max-width:800px) {
            #hero-title {
                font-size: 50px;
            }

            .subtitle{
                font-size: 14px;
            }

            #hero-title, .subtitle{
                padding: 0 40px 0 40px;
            }

            .btn-group{
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Menu Navigasi -->
    <nav>
        <div class="nav-container">
            <div class="logo">Rafli's \ <span>raihan's</span></div>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="about.html">About Me</a>
                <a href="gallery.html">Gallery</a>
                <a href="blog.html">Posts</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Konten Utama (Hero) -->
    <main id="hero-section">
        <h1 id="hero-title">Hi, how are you?</h1>
        <p class="subtitle">
            Thanks for checking out my website, feel free to explore this little digital corner of mine....
        </p>
        <div class="btn-group">
            <!-- HTML Link Wajib -->
            <a href="about.html" class="btn btn-primary">View About Me &rarr;</a>
            <a href="blog.html" class="btn btn-secondary">View Posts &rarr;</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Rafli's Digital Corner. All Original Rights Reserved.</p>
    </footer>

    <!-- Mengubungkan ke File JS Eksternal -->
    <script src="script.js"></script>
</body>
</html>
