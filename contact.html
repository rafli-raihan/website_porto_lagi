    <link rel="stylesheet" href="base.css">
    <style>
        .container{
            display: flex;
            gap: 50px;
            align-items: center;
            justify-content: space-evenly;
            min-height: 75vh;
        }
        
        h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .contact-info p {
            color: #adadad;
            margin-bottom: 30px;
        }

        .social-list {
            list-style: none;
            padding: 0;
        }

        .social-list li {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .social-list a {
            color: var(--btn-primary-bg);
            text-decoration: none;
            font-weight: bold;
        }

        .social-list a:hover {
            text-decoration: underline;
        }
        
        /* WAJIB: STYLING FORM KONTAK */
        form {
            color: #ffffff;
            background-image: url('assets/hero_bg.png');
            min-width: 300px;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #e5e5e5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            border: 1px solid #c8c8c9;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input[type="text"]:focus, input[type="email"]:focus, textarea:focus {
            outline: none;
            border-color: var(--btn-primary-border);
        }

        #submit-btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        table {
            min-width: 100%;
        }

        td{
            padding: 3px;
        }

        #sosmed-btn {
            color: white;
            padding: 5px;
            min-width: 100%;
            height: 64px;
            display: flex;
            gap: 2%;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 14px;
            transition: transform 0.1s ease-in-out, opacity 0.2s ease-in-out;
        }

        #sosmed-btn:hover {
            transform: scale(1.03); /* Membesar ringan sebesar 3% */
            cursor: pointer;        /* Mengubah kursor menjadi tangan saat hover */
            opacity: 0.9;           /* Opsional: memberikan sedikit efek pudar pas di-hover */
        }

        #sosmed-btn:active {
            transform: scale(0.98); /* Sedikit mengecil saat tombol diklik */
        }

        a {
            text-decoration: none;
        }

        a span {
            font-size: 16px;
            font-weight: bold;
        }

        @media screen and (max-width:800px){
            .container{
                flex-direction: column;
                align-items: start;
            }

            form {
                min-width: none;
            }
        }
    </style>
</head>

            <form id="contactForm" onsubmit="return validateForm(event)">
                <h3>Send a Message (Anonymously)</h3>
                <div class="form-group">
                    <label for="txtNama">Name (optional)</label>
                    <input type="text" id="txtNama" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="txtPesan">Message</label>
                    <textarea id="txtPesan" rows="5" placeholder="Write your message here..."></textarea>
